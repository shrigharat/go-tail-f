<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WebSocket Terminal</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #00ff00;
      font-family: monospace;
    }

    #terminal {
      padding: 16px;
      height: 100vh;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    .line::before {
      content: "> ";
      color: #00ff00;
    }

    .system {
      color: #888;
    }
  </style>
</head>
<body>
  <div id="terminal"></div>

  <script>
    const terminal = document.getElementById("terminal");

    function printLine(message, className = "") {
      const div = document.createElement("div");
      div.className = "line " + className;
      div.textContent = message;
      terminal.appendChild(div);
      terminal.scrollTop = terminal.scrollHeight;
    }

    const ws = new WebSocket("ws://localhost:8000/ws");

    // Buffer historical lines (sent newest-first) until the burst ends,
    // then flush them reversed so oldest appears first.
    let historicalBuffer = [];
    let isHistorical = true;
    let flushTimer = null;

    function flushHistorical() {
      isHistorical = false;
      historicalBuffer.reverse().forEach(msg => printLine(msg));
      historicalBuffer = [];
    }

    ws.onopen = () => {
      printLine("Connected to WebSocket", "system");
    };

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      if (msg.error) {
        printLine(msg.error, "system");
        return;
      }
      const text = msg.line ?? "";
      if (isHistorical) {
        clearTimeout(flushTimer);
        historicalBuffer.push(text);
        // historical lines arrive in a tight burst; realtime lines come ≥5s apart
        flushTimer = setTimeout(flushHistorical, 500);
      } else {
        printLine(text);
      }
    };

    ws.onerror = (error) => {
      printLine("Error occurred", "system");
      console.error(error);
    };

    ws.onclose = () => {
      printLine("Connection closed", "system");
    };
  </script>
</body>
</html>
